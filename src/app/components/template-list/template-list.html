<section class="mx-auto max-w-400 px-7 pb-10 pt-6">
  <!-- Toolbar: count badge + action buttons -->
  <div class="mb-5 flex items-center justify-between">
    <div class="inline-flex items-center gap-3 rounded-10 border border-edge-card bg-white px-5 py-3">
      <span class="text-22 font-extrabold leading-none text-ink">{{ totalCount }}</span>
      <span class="text-13 font-semibold text-muted">Total Available Templates</span>
    </div>

    <div class="inline-flex items-center gap-3">
      @if (templates.length === 0) {
        <button
          class="inline-flex cursor-pointer items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-schneider bg-white px-4.5 py-3 text-15 font-semibold leading-none text-schneider transition-colors duration-150 hover:bg-schneider-light"
          type="button"
          (click)="resetData()"
        >
          <i class="pi pi-refresh text-13"></i>
          Reset Data
        </button>
      }
      <button
        class="inline-flex cursor-pointer items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-transparent bg-schneider px-5.5 py-3 text-15 font-semibold leading-none text-white shadow-btn transition-colors duration-150 hover:bg-schneider-dark active:bg-schneider-darker"
        type="button"
        (click)="openAdd()"
      >
        <i class="pi pi-plus text-13 font-bold"></i>
        Upload New Template
      </button>
    </div>
  </div>

  <!-- Templates table -->
  <div class="overflow-hidden rounded-xl border border-edge-table bg-white shadow-panel">
    <p-table
      [value]="templates"
      dataKey="id"
      [tableStyle]="{ 'min-width': '900px' }"
      styleClass="ges-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th class="w-22.5">S.No</th>
          <th>Project</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Template Status</th>
          <th class="w-45 text-left">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-row let-i="rowIndex">
        <tr>
          <td class="w-22.5">{{ i + 1 }}</td>
          <td class="text-slate-700">{{ row.project }}</td>
          <td>{{ row.customer }}</td>
          <td>{{ row.product }}</td>
          <td>
            <span class="inline-flex items-center gap-2 whitespace-nowrap text-sm text-gray-700">
              <span class="inline-block h-2.5 w-2.5 shrink-0 rounded-full" [class]="statusDotClass(row.status)"></span>
              {{ row.status }}
            </span>
          </td>
          <td class="w-45 text-left">
            <div class="inline-flex items-center gap-2">
              <button
                class="inline-flex h-7.5 w-8.5 cursor-pointer items-center justify-center rounded-md border border-gray-200 bg-white text-sm text-blue-500 transition-colors duration-150 hover:border-blue-200 hover:bg-blue-50"
                type="button"
                title="View"
                (click)="openView(row)"
              >
                <i class="pi pi-eye"></i>
              </button>
              <button
                class="inline-flex h-7.5 w-8.5 cursor-pointer items-center justify-center rounded-md border border-gray-200 bg-white text-sm text-muted transition-colors duration-150 hover:border-gray-300 hover:bg-gray-100"
                type="button"
                title="Edit"
                (click)="openEdit(row)"
              >
                <i class="pi pi-pencil"></i>
              </button>
              <button
                class="inline-flex h-7.5 w-8.5 cursor-pointer items-center justify-center rounded-md border border-gray-200 bg-white text-sm text-red-500 transition-colors duration-150 hover:border-red-200 hover:bg-red-50"
                type="button"
                title="Delete"
                (click)="openDelete(row)"
              >
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="px-6 py-10 text-center text-sm text-slate-400">
            No templates available. Click "Upload New Template" to add one.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>

<!-- Add / Edit / View dialog -->
<app-template-form
  [visible]="formVisible"
  [mode]="formMode"
  [template]="selectedTemplate"
  (save)="onSave($event)"
  (closed)="closeForm()"
/>

<!-- Delete confirmation dialog -->
<app-delete-confirm
  [visible]="deleteVisible"
  [template]="templateToDelete"
  (confirm)="onConfirmDelete()"
  (cancel)="closeDeleteDialog()"
/>
