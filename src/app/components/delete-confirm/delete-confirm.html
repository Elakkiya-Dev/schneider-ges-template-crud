<p-dialog
  [visible]="visible"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [dismissableMask]="true"
  [style]="{ width: '460px' }"
  styleClass="ges-dialog ges-delete-dialog"
>
  <ng-template pTemplate="header">
    <div class="flex w-full items-center justify-between">
      <span class="text-19 font-extrabold tracking-heading text-schneider">Confirm Deletion</span>
      <button
        class="inline-flex h-7 w-7 cursor-pointer items-center justify-center rounded-md border-none bg-transparent text-17 text-subtle transition-colors duration-150 hover:bg-gray-100 hover:text-gray-600"
        type="button"
        (click)="onCancel()"
        aria-label="Close"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>
  </ng-template>

  <div class="flex flex-col items-center px-7 pb-6 pt-6.5 text-center">
    <div
      class="mb-4.5 inline-flex h-16 w-16 items-center justify-center rounded-14 bg-danger-soft"
    >
      <i class="pi pi-exclamation-triangle text-3xl text-danger"></i>
    </div>
    <p class="mb-2.5 text-17 font-bold leading-copy text-ink">
      Are you sure you want to delete
      <strong>{{ template?.project }}</strong> template?
    </p>
    <p class="m-0 max-w-90 text-13.5 leading-copy-loose text-gray-500">
      This action cannot be undone. All configuration data associated with this
      template will be permanently removed from the industrial database.
    </p>
  </div>

  <ng-template pTemplate="footer">
    <div class="grid w-full grid-cols-2 gap-3.5">
      <button
        class="inline-flex w-full cursor-pointer items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-schneider bg-white px-5 py-3 text-15 font-semibold leading-none text-schneider transition-colors duration-150 hover:bg-schneider-light"
        type="button"
        (click)="onCancel()"
      >
        No
      </button>
      <button
        class="inline-flex w-full cursor-pointer items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-transparent bg-schneider px-5 py-3 text-15 font-semibold leading-none text-white transition-colors duration-150 enabled:hover:bg-schneider-dark enabled:active:bg-schneider-darker"
        type="button"
        (click)="onConfirm()"
      >
        Yes
      </button>
    </div>
  </ng-template>
</p-dialog>
