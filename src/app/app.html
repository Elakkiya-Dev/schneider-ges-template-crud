<header
  class="topbar sticky top-0 z-20 flex h-18 items-center justify-between border-b border-edge-header bg-white px-8 shadow-card"
>
  <div class="flex items-center gap-5.5">
    <!-- Schneider Electric wordmark -->
    <span
      class="inline-flex select-none flex-col items-start leading-none"
      aria-label="Schneider Electric"
    >
      <span class="text-xl font-extrabold tracking-heading-lg text-wordmark">Schneider</span>
      <span
        class="mt-0.75 inline-flex items-center gap-1 border-t-2 border-schneider py-px pl-0 pr-1 text-11 font-bold tracking-caps text-schneider"
      >
        <span
          class="inline-block h-2.5 w-2.5 rotate-45 border-[1.5px] border-schneider bg-transparent"
        ></span>
        Electric
      </span>
    </span>
    <span class="text-22 font-extrabold tracking-heading text-schneider"
      >Global Engineering &amp; Services</span
    >
  </div>

  <nav class="flex items-center gap-6">
    <button
      class="inline-flex h-8 w-8 cursor-pointer items-center justify-center rounded-full border-none bg-transparent text-lg text-slate-600 transition-colors duration-150 hover:bg-slate-100"
      type="button"
      (click)="toggleTheme()"
      aria-label="Toggle theme"
    >
      <i class="pi" [class.pi-sun]="!isDark" [class.pi-moon]="isDark"></i>
    </button>
    <button
      class="text-15 font-semibold text-slate-700 no-underline hover:text-schneider"
      type="button"
      >About</button
    >
    <div class="flex items-center gap-2.5">
      <span
        class="inline-flex h-8.5 w-8.5 items-center justify-center rounded-full bg-schneider text-15 text-white"
        ><i class="pi pi-user"></i
      ></span>
      <span class="text-15 font-bold text-ink">Hello, {{ userName }}</span>
    </div>
  </nav>
</header>

<main class="block">
  <router-outlet />
</main>

<p-toast position="top-right" />
